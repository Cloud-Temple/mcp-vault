<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Temple — MCP Vault</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css">
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <img src="/admin/static/img/logo-cloudtemple.svg" alt="Cloud Temple" class="login-logo">
        <h2>MCP Vault</h2>
        <p class="login-subtitle">Gestion sécurisée des secrets pour agents IA</p>
        <form class="login-form" id="loginForm">
            <label for="loginToken">🔑 Token d'accès</label>
            <input type="password" id="loginToken" placeholder="Collez votre token ici…" autocomplete="off" autofocus>
            <div class="login-error" id="loginError"></div>
            <button type="submit">Se connecter</button>
        </form>
        <p class="login-hint">Contactez votre administrateur pour obtenir un token.</p>
    </div>
</div>

<!-- ═══════════════ APP MAIN ═══════════════ -->
<div id="appMain" class="hidden">

    <!-- Header -->
    <div class="header">
        <div class="header-brand">
            <img src="/admin/static/img/logo-cloudtemple.svg" alt="Cloud Temple" class="header-logo">
            <span class="header-sep">|</span>
            <h1>MCP Vault</h1>
        </div>
        <div class="header-right">
            <span id="headerUser"></span>
            <span id="headerVersion"></span>
            <button class="btn-logout" onclick="logout()" title="Déconnexion">🔓</button>
        </div>
    </div>

    <!-- Sidebar + Content -->
    <div class="app-layout">
        <div class="sidebar">
            <div class="sidebar-title">Navigation</div>
            <div class="sidebar-nav" id="sidebarNav"></div>
        </div>
        <div class="main-content">
            <div id="page-dashboard" class="hidden"></div>
            <div id="page-vaults" class="hidden"></div>
            <div id="page-tokens" class="hidden"></div>
            <div id="page-activity" class="hidden"></div>
        </div>
    </div>
</div>

<!-- ═══════════════ MODAL — Créer vault ═══════════════ -->
<div id="modalCreateVault" class="modal-overlay">
    <div class="modal">
        <h2>🗄️ Nouveau vault</h2>
        <div class="form-group">
            <label for="cvVaultId">Identifiant du vault *</label>
            <input type="text" id="cvVaultId" placeholder="ex: serveurs-prod">
        </div>
        <div class="form-group">
            <label for="cvDescription">Description</label>
            <input type="text" id="cvDescription" placeholder="Description optionnelle">
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('modalCreateVault')">Annuler</button>
            <button class="btn btn-primary" onclick="doCreateVault()">Créer</button>
        </div>
    </div>
</div>

<!-- ═══════════════ MODAL — Écrire secret (formulaire dynamique) ═══════════════ -->
<div id="modalWriteSecret" class="modal-overlay">
    <div class="modal modal-lg">
        <h2>🔐 Nouveau secret</h2>
        <input type="hidden" id="wsVaultId">
        <div class="form-row">
            <div class="form-group">
                <label for="wsPath">Chemin <span class="field-required">*</span></label>
                <input type="text" id="wsPath" placeholder="ex: db/postgres-prod">
            </div>
            <div class="form-group">
                <label for="wsType">Type de secret</label>
                <select id="wsType" onchange="renderSecretFields(this.value)">
                    <option value="login">🔑 Identifiants</option>
                    <option value="password">🔒 Mot de passe</option>
                    <option value="api_key">🔌 Clé API</option>
                    <option value="database">🗄️ Base de données</option>
                    <option value="server">🖥️ Serveur</option>
                    <option value="ssh_key">🗝️ Clé SSH</option>
                    <option value="certificate">📜 Certificat TLS</option>
                    <option value="env_file">📄 Fichier .env</option>
                    <option value="secure_note">📝 Note sécurisée</option>
                    <option value="credit_card">💳 Carte bancaire</option>
                    <option value="identity">👤 Identité</option>
                    <option value="wifi">📶 Wi-Fi</option>
                    <option value="crypto_wallet">₿ Wallet crypto</option>
                    <option value="custom">⚙️ Personnalisé (JSON)</option>
                </select>
            </div>
        </div>
        <!-- Conteneur dynamique : les champs changent selon le type sélectionné -->
        <div id="wsFields"></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('modalWriteSecret')">Annuler</button>
            <button class="btn btn-primary" onclick="doWriteSecret()">💾 Enregistrer</button>
        </div>
    </div>
</div>

<!-- ═══════════════ MODAL — Créer token ═══════════════ -->
<div id="modalCreateToken" class="modal-overlay">
    <div class="modal">
        <h2>🔑 Nouveau token</h2>
        <div class="form-group">
            <label for="ctName">Nom du client *</label>
            <input type="text" id="ctName" placeholder="ex: mcp-agent-sre">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="ctEmail">Email</label>
                <input type="email" id="ctEmail" placeholder="admin@company.com">
            </div>
            <div class="form-group">
                <label for="ctExpires">Expiration (jours)</label>
                <input type="number" id="ctExpires" value="90" min="0">
            </div>
        </div>
        <div class="form-group">
            <label>Permissions</label>
            <div class="checkbox-group">
                <label><input type="checkbox" checked disabled> read</label>
                <label><input type="checkbox" id="ctPermWrite"> write</label>
                <label><input type="checkbox" id="ctPermAdmin"> admin</label>
            </div>
        </div>
        <div class="form-group">
            <label for="ctVaults">Vaults autorisés (vide = mes vaults)</label>
            <input type="text" id="ctVaults" placeholder="vault1, vault2">
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('modalCreateToken')">Annuler</button>
            <button class="btn btn-primary" onclick="doCreateToken()">Créer</button>
        </div>
    </div>
</div>

<!-- ═══════════════ MODAL — Modifier token ═══════════════ -->
<div id="modalEditToken" class="modal-overlay">
    <div class="modal">
        <h2>✏️ Modifier le token</h2>
        <input type="hidden" id="etHashPrefix">
        <div class="form-group">
            <label>Permissions</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="etPermRead"> read</label>
                <label><input type="checkbox" id="etPermWrite"> write</label>
                <label><input type="checkbox" id="etPermAdmin"> admin</label>
            </div>
        </div>
        <div class="form-group">
            <label for="etVaults">Vaults autorisés (vide = mes vaults)</label>
            <input type="text" id="etVaults" placeholder="vault1, vault2">
        </div>
        <div class="form-group">
            <label for="etPolicy">Policy ID (optionnel)</label>
            <input type="text" id="etPolicy" placeholder="ex: read-only">
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('modalEditToken')">Annuler</button>
            <button class="btn btn-primary" onclick="doUpdateToken()">💾 Enregistrer</button>
        </div>
    </div>
</div>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="/admin/static/js/config.js"></script>
<script src="/admin/static/js/api.js"></script>
<script src="/admin/static/js/dashboard.js"></script>
<script src="/admin/static/js/vaults.js"></script>
<script src="/admin/static/js/tokens.js"></script>
<script src="/admin/static/js/activity.js"></script>
<script src="/admin/static/js/app.js"></script>
</body>
</html>
