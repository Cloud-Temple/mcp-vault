<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MCP Vault</title>
    <style>
        :root { --bg: #0f0f23; --surface: #1a1a2e; --accent: #41a890; --text: #e0e0e0; --muted: #888; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { color: var(--accent); font-size: 1.2rem; }
        .header h1::before { content: "🔐 "; }
        .content { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--surface); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { color: var(--accent); margin-bottom: 1rem; font-size: 1rem; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        .status.ok { background: #1a4a3a; color: #41a890; }
        .status.error { background: #4a1a1a; color: #e74c3c; }
        pre { background: #0a0a1a; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .info-item { padding: 0.5rem; }
        .info-item .label { color: var(--muted); font-size: 0.8rem; }
        .info-item .value { font-size: 1.1rem; margin-top: 0.2rem; }
        .loading { color: var(--muted); font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MCP Vault — Admin Console</h1>
        <span id="version" class="loading">loading...</span>
    </div>
    <div class="content">
        <div class="card">
            <h2>🏥 Service Health</h2>
            <div id="health" class="loading">Chargement...</div>
        </div>
        <div class="card">
            <h2>🔑 Tokens</h2>
            <div id="tokens" class="loading">Chargement...</div>
        </div>
        <div class="card">
            <h2>📊 Activité récente</h2>
            <div id="logs" class="loading">Chargement...</div>
        </div>
    </div>
    <script>
        const TOKEN = prompt("Bearer token admin :");
        const headers = { "Authorization": `Bearer ${TOKEN}` };

        async function loadHealth() {
            try {
                const r = await fetch("/admin/api/health", { headers });
                const d = await r.json();
                document.getElementById("version").textContent = `v${d.version}`;
                document.getElementById("health").innerHTML = `
                    <div class="info-grid">
                        <div class="info-item"><div class="label">Service</div><div class="value">${d.service_name}</div></div>
                        <div class="info-item"><div class="label">Status</div><div class="value"><span class="status ok">${d.status}</span></div></div>
                        <div class="info-item"><div class="label">Tools</div><div class="value">${d.tools_count} outils</div></div>
                        <div class="info-item"><div class="label">Python</div><div class="value">${d.python_version}</div></div>
                    </div>
                    <pre>${JSON.stringify(d.tools, null, 2)}</pre>`;
            } catch(e) { document.getElementById("health").innerHTML = `<span class="status error">Erreur: ${e.message}</span>`; }
        }

        async function loadTokens() {
            try {
                const r = await fetch("/admin/api/tokens", { headers });
                const d = await r.json();
                const rows = d.tokens.map(t => `<tr>
                    <td>${t.client_name}</td>
                    <td>${t.permissions.join(", ")}</td>
                    <td>${t.hash_prefix}...</td>
                    <td>${t.revoked ? '<span class="status error">révoqué</span>' : '<span class="status ok">actif</span>'}</td>
                </tr>`).join("");
                document.getElementById("tokens").innerHTML = d.tokens.length ?
                    `<table style="width:100%;border-collapse:collapse"><tr style="color:var(--muted);text-align:left"><th>Client</th><th>Permissions</th><th>Hash</th><th>Status</th></tr>${rows}</table>` :
                    `<span class="loading">Aucun token (S3 non configuré ou vide)</span>`;
            } catch(e) { document.getElementById("tokens").innerHTML = `<span class="status error">Erreur</span>`; }
        }

        async function loadLogs() {
            try {
                const r = await fetch("/admin/api/logs", { headers });
                const d = await r.json();
                const items = d.logs.slice(-10).reverse().map(l =>
                    `<div style="padding:0.3rem 0;border-bottom:1px solid #222">📡 ${l.method} ${l.path} → ${l.status} (${l.duration_ms}ms)</div>`
                ).join("");
                document.getElementById("logs").innerHTML = items || "<span class='loading'>Aucune activité</span>";
            } catch(e) { document.getElementById("logs").innerHTML = `<span class="status error">Erreur</span>`; }
        }

        loadHealth(); loadTokens(); loadLogs();
    </script>
</body>
</html>
